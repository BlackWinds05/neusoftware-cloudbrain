server:
  port: 8080

spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/cloudbrain?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password_here}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: ${JWT_SECRET:your_jwt_secret_here}
  expiration: 86400000

deepseek:
  api-key: ${DEEPSEEK_API_KEY:your_api_key_here}
  base-url: https://api.deepseek.com
  model: deepseek-chat

logging:
  level:
    com.neusoft.cloudbrain: debug
