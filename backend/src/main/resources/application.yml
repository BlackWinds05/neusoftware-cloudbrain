server:
  port: 8080

spring:
  profiles:
    active: dev
  
  datasource:
    url: jdbc:mysql://localhost:3306/cloudbrain?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  sql:
    init:
      mode: never
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: cloudbrain-neusoft-2026-jwt-secret-key
  expiration: 86400000

logging:
  level:
    com.neusoft.cloudbrain: debug
